<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workflow Automation Stappenplan</title>
  <style>
    :root {
      --bg:      #0a0f1e;
      --surface: #1e293b;
      --border:  #334155;
      --text:    #f1f5f9;
      --muted:   #64748b;
      --subtle:  #94a3b8;
      --c1: #3b82f6;
      --c2: #6366f1;
      --c3: #8b5cf6;
      --c4: #a855f7;
      --c5: #22c55e;
      --c6: #10b981;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 24px;
    }

    .container { max-width: 960px; margin: 0 auto; }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 32px;
    }

    .btn-print {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--subtle);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-print:hover { border-color: var(--subtle); color: var(--text); }

    .header { text-align: center; margin-bottom: 48px; }
    .header h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
    .header p  { color: var(--muted); margin-top: 8px; font-size: 14px; }

    @media print {
      body { background: white; color: #1e293b; padding: 16px; }
      .toolbar, .progress-controls { display: none !important; }
      .detail-panel { display: grid !important; break-inside: avoid; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="toolbar">
      <button class="btn-print" onclick="window.print()">🖨️ Opslaan als PDF</button>
    </div>
    <div class="header">
      <h1>Van idee naar werkende automation</h1>
      <p>Jouw traject in 6 stappen — van eerste gesprek tot live resultaat</p>
    </div>
    <!-- timeline goes here -->
    <!-- detail panels go here -->
  </div>
  <script>
    // JS goes here
  </script>
</body>
</html>
