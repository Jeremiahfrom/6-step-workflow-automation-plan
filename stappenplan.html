<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workflow Automation Stappenplan</title>
  <style>
    :root {
      --bg:      #0a0f1e;
      --surface: #1e293b;
      --border:  #334155;
      --text:    #f1f5f9;
      --muted:   #64748b;
      --subtle:  #94a3b8;
      --c1: #3b82f6;
      --c2: #6366f1;
      --c3: #8b5cf6;
      --c4: #a855f7;
      --c5: #22c55e;
      --c6: #10b981;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 24px;
    }

    .container { max-width: 960px; margin: 0 auto; }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 32px;
    }

    .btn-print {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--subtle);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-print:hover { border-color: var(--subtle); color: var(--text); }

    .header { text-align: center; margin-bottom: 48px; }
    .header h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
    .header p  { color: var(--muted); margin-top: 8px; font-size: 14px; }

    @media print {
      body { background: white; color: #1e293b; padding: 16px; }
      .toolbar, .progress-controls { display: none !important; }
      .detail-panel { display: grid !important; break-inside: avoid; }
    }

    /* ── Timeline ─────────────────────────────────── */
    .timeline {
      position: relative;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 32px;
    }

    .timeline::before {
      content: '';
      position: absolute;
      top: 28px;
      left: calc(100% / 12);
      right: calc(100% / 12);
      height: 2px;
      background: linear-gradient(to right, var(--c1), var(--c3), var(--c6));
      z-index: 0;
    }

    .phase {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      z-index: 1;
      padding: 0 4px;
      user-select: none;
    }

    .phase-circle {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      border: 3px solid var(--bg);
      transition: transform 0.15s ease;
      position: relative;
    }

    .phase:hover .phase-circle { transform: scale(1.08); }

    /* done checkmark badge */
    .phase.done .phase-circle::before {
      content: '✓';
      position: absolute;
      top: -6px; right: -6px;
      background: #22c55e;
      color: white;
      border-radius: 50%;
      width: 20px; height: 20px;
      font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }

    /* active ring */
    .phase.active .phase-circle::after {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 2px solid white;
      opacity: 0.4;
    }

    .phase-number { font-size: 11px; font-weight: 700; margin-top: 10px; text-align: center; }
    .phase-name   { font-size: 12px; color: var(--text); margin-top: 4px; text-align: center; font-weight: 600; line-height: 1.3; }
  </style>
</head>
<body>
  <div class="container">
    <div class="toolbar">
      <button class="btn-print" onclick="window.print()">🖨️ Opslaan als PDF</button>
    </div>
    <div class="header">
      <h1>Van idee naar werkende automation</h1>
      <p>Jouw traject in 6 stappen — van eerste gesprek tot live resultaat</p>
    </div>
    <div class="timeline">
      <div class="phase" id="phase-1" onclick="togglePhase(1)">
        <div class="phase-circle" style="background:var(--c1)">🤝</div>
        <div class="phase-number" style="color:var(--c1)">STAP 1</div>
        <div class="phase-name">Intake<br>gesprek</div>
      </div>
      <div class="phase" id="phase-2" onclick="togglePhase(2)">
        <div class="phase-circle" style="background:var(--c2)">🗺️</div>
        <div class="phase-number" style="color:var(--c2)">STAP 2</div>
        <div class="phase-name">Proces<br>analyse</div>
      </div>
      <div class="phase" id="phase-3" onclick="togglePhase(3)">
        <div class="phase-circle" style="background:var(--c3)">📋</div>
        <div class="phase-number" style="color:var(--c3)">STAP 3</div>
        <div class="phase-name">Ontwerp<br>&amp; voorstel</div>
      </div>
      <div class="phase" id="phase-4" onclick="togglePhase(4)">
        <div class="phase-circle" style="background:var(--c4)">⚙️</div>
        <div class="phase-number" style="color:var(--c4)">STAP 4</div>
        <div class="phase-name">Bouwen<br>&amp; configureren</div>
      </div>
      <div class="phase" id="phase-5" onclick="togglePhase(5)">
        <div class="phase-circle" style="background:var(--c5)">✅</div>
        <div class="phase-number" style="color:var(--c5)">STAP 5</div>
        <div class="phase-name">Testen<br>&amp; feedback</div>
      </div>
      <div class="phase" id="phase-6" onclick="togglePhase(6)">
        <div class="phase-circle" style="background:var(--c6)">🚀</div>
        <div class="phase-number" style="color:var(--c6)">STAP 6</div>
        <div class="phase-name">Live<br>&amp; nazorg</div>
      </div>
    </div>
    <!-- detail panels go here -->
  </div>
  <script>
    // JS goes here
  </script>
</body>
</html>
